---
layout: default
---
<article class="post {{ page.custom_class }}">

  {% if page.custom_class == "lecture-detail" %}

    <a href="{{ '/eportfolio/' | relative_url }}" class="back-button">

      ← Back

    </a>

  {% endif %}

  <header class="post-header">

      <h1 class="post-title">

        {{ page.page_heading | default: page.title | escape }}

      </h1>

      {% if page.excerpt %}

        <p class="post-keywords">

        <strong>Keywords:</strong> {{ page.excerpt }}

        </p>

      {% endif %}

  </header>

  <div class="post-content">

    {{ content }}
</article>
