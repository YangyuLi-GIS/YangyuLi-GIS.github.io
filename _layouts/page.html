---
layout: default
---
<article class="post {{ page.custom_class }}">

  {% if page.custom_class == "lecture-detail" %}

    <a href="{{ '/eportfolio/' | relative_url }}" class="back-button">

      ← Back

    </a>

  {% endif %}

  <header class="post-header">

    <h1 class="post-title">

      {{ page.page_heading | default: page.title | escape }}

    </h1>

  </header>

  <div class="post-content">

    {{ content }}
</article>
